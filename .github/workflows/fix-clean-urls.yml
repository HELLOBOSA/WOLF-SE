name: Fix clean internal URLs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-clean-urls:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace index.html links with clean URLs
        shell: bash
        run: |
          if [ -d journal ]; then
            find journal -name 'index.html' -type f -print0 | xargs -0 sed -i \
              -e 's#href="../../index.html#href="../../#g'
          fi

      - name: Commit clean URL fix
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add journal
            git commit -m "Fix clean internal URLs"
            git push
          else
            echo "No clean URL changes needed."
          fi
