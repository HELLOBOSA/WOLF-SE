<script>
(function(){
  var banner=document.getElementById('cookie-banner');
  if(!banner)return;
  var storageKey='wb-cookie-choice';
  var consentDays=180;
  function expiryTime(){return Date.now()+consentDays*24*60*60*1000;}
  function readChoice(){
    var raw=localStorage.getItem(storageKey);
    if(!raw)return null;
    try{
      var saved=JSON.parse(raw);
      if(saved&&saved.expires&&saved.expires>Date.now())return saved.choice||'saved';
      localStorage.removeItem(storageKey);
      return null;
    }catch(e){
      localStorage.setItem(storageKey,JSON.stringify({choice:raw,expires:expiryTime()}));
      return raw;
    }
  }
  function currentLang(){return localStorage.getItem('wb-se-lang')||localStorage.getItem('wb-lang')||document.documentElement.lang||'sv';}
  function setCookieLang(lang){
    lang=(lang||'sv').slice(0,2)==='en'?'en':'sv';
    banner.querySelectorAll('[data-sv][data-en]').forEach(function(el){el.innerHTML=el.getAttribute('data-'+lang);});
    banner.querySelectorAll('[data-sv-aria][data-en-aria]').forEach(function(el){el.setAttribute('aria-label',el.getAttribute('data-'+lang+'-aria'));});
  }
  function closeBanner(choice){
    localStorage.setItem(storageKey,JSON.stringify({choice:choice,expires:expiryTime()}));
    banner.hidden=true;
    document.body.classList.remove('cookie-banner-visible');
  }
  setCookieLang(currentLang());
  if(!readChoice()){banner.hidden=false;document.body.classList.add('cookie-banner-visible');}
  banner.querySelectorAll('[data-cookie-choice]').forEach(function(btn){btn.addEventListener('click',function(){closeBanner(btn.getAttribute('data-cookie-choice'));});});
  document.querySelectorAll('[data-lang-switch]').forEach(function(btn){btn.addEventListener('click',function(){setCookieLang(btn.getAttribute('data-lang-switch'));});});
})();
</script>

<script>
(function(){
  var btt=document.getElementById('btt');
  var banner=document.getElementById('cookie-banner');
  var footer=document.querySelector('footer');
  if(!btt||!banner)return;
  function bannerVisible(){return !banner.hidden&&window.getComputedStyle(banner).display!=='none';}
  function baseBottom(){return bannerVisible()?banner.offsetHeight+40:32;}
  function adjustCookieSafeBackToTop(){
    var base=baseBottom();
    if(footer){
      var rect=footer.getBoundingClientRect();
      if(rect.top<window.innerHeight){
        btt.style.bottom=Math.max(base,window.innerHeight-rect.top+16)+'px';
        return;
      }
    }
    btt.style.bottom=bannerVisible()?base+'px':'';
  }
  window.addEventListener('scroll',adjustCookieSafeBackToTop,{passive:true});
  window.addEventListener('resize',adjustCookieSafeBackToTop,{passive:true});
  new MutationObserver(adjustCookieSafeBackToTop).observe(banner,{attributes:true,attributeFilter:['hidden','style','class']});
  banner.addEventListener('click',function(){setTimeout(adjustCookieSafeBackToTop,0);});
  adjustCookieSafeBackToTop();
})();
</script>
